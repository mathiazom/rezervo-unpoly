<!doctype html>
<html lang="no">
  <head>
    {{template "head" .}}
  </head>
  <body
    class="min-h-screen bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 flex items-center justify-center"
  >
    <main class="w-full max-w-sm px-6">
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-8 shadow-sm">
        <img src="/static/icons/icon.png" alt="rezervo" class="w-16 h-16 rounded-2xl mb-6" />
        <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-8">Logg inn for å se dine timer</p>
        <a
          href="/auth/start"
          class="block w-full text-center bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 font-medium py-2.5 px-4 rounded-lg hover:bg-zinc-700 dark:hover:bg-zinc-300 transition-colors"
        >
          Logg inn
        </a>
      </div>
    </main>
  </body>
</html>
