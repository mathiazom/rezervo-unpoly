{{define "head"}}
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>rezervo</title>
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png" />
<script src="https://unpkg.com/unpoly@3/unpoly.min.js"></script>
<script src="/static/js/swipe-cancel.js" defer></script>
<link rel="stylesheet" href="https://unpkg.com/unpoly@3/unpoly.min.css" />
<link rel="stylesheet" href="/static/css/output.css" />
<script>
  up.on("up:layer:dismiss", (event) => {
    if (up.network.isBusy()) event.preventDefault();
  });

  const _cancelSubmitting = new WeakSet();
  up.on("up:form:submit", "[data-cancel-form]", async (event) => {
    if (_cancelSubmitting.has(event.target)) return;
    event.preventDefault();
    const form = event.target;
    const card = document.getElementById("session-" + form.dataset.chain + "-" + form.dataset.classId);
    if (card) {
      await card.animate(
        [
          { opacity: 1, transform: "translateX(0)" },
          { opacity: 0, transform: "translateX(-1.5rem)" },
        ],
        { duration: 200, easing: "ease-in", fill: "forwards" },
      ).finished;
      card.style.display = "none";
    }
    _cancelSubmitting.add(form);
    up.submit(form);
  });

  up.on("up:link:follow", "a[data-detail-link]", (event) => {
    if (window.innerWidth < 640) {
      event.renderOptions.layer = "root";
      event.renderOptions.target = "main";
      event.renderOptions.cache = true;
    }
  });
</script>
<style>
  @media (max-width: 639px) {
    body:has(main.detail-main) {
      background-color: white;
    }
    @media (prefers-color-scheme: dark) {
      body:has(main.detail-main) {
        background-color: rgb(24 24 27); /* zinc-900 */
      }
    }
  }
  up-modal main.detail-main {
    padding: 0;
  }
  up-modal main.detail-main > div {
    max-width: none;
    margin: 0;
  }
  button.up-active .submit-spinner {
    display: inline;
  }
  button.up-active ~ a[up-dismiss] {
    pointer-events: none;
    opacity: 0.4;
  }
  up-modal-dismiss {
    padding: 0.75rem;
  }
  up-modal-box {
    border-radius: 1rem;
    box-shadow: none;
    padding: 0.5rem;
    max-width: 480px;
    margin: 1rem;
  }
  @media (prefers-color-scheme: dark) {
    up-modal-box {
      background-color: rgb(24 24 27); /* zinc-900 */
      border-color: rgb(63 63 70); /* zinc-700 */
      color: rgb(244 244 245); /* zinc-100 */
    }
  }
</style>
{{end}}
