<!doctype html>
<html lang="no">
  <head>
    {{template "head" .}}
  </head>
  <body class="bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100">
    <main class="p-6">
      <h2 class="text-lg font-semibold mb-1">Avbestill time?</h2>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-6">
        Er du sikker på at du vil avbestille
        <strong class="text-zinc-900 dark:text-zinc-100 font-medium">{{.ActivityName}}</strong>
        ?
      </p>
      <div class="flex gap-3">
        <form method="post" action="/cancel/{{.Chain}}/{{.ClassID}}" up-layer="root">
          <button
            type="submit"
            class="flex items-center gap-2 bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
          >
            <img
              src="/static/icons/icon.png"
              class="submit-spinner hidden animate-spin h-4 w-4 brightness-0 invert"
              alt=""
            />
            Ja, avbestill
          </button>
        </form>
        <a
          href="/bookings"
          up-dismiss
          class="bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-700 dark:text-zinc-300 text-sm font-medium px-4 py-2 rounded-lg transition-colors"
        >
          Avbryt
        </a>
      </div>
    </main>
  </body>
</html>
